<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svencycles ERP — Werkstatt-Management</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e0e;--bg2:#1a1a1a;--bg3:#252525;--orange:#f07000;--orange2:#ff8c00;--text:#e0e0e0;--text2:#999;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--sidebar-w:220px}
body{font-family:'Space Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;font-weight:600}
button{font-family:'Space Mono',monospace;cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:13px;transition:all .2s}
input,select,textarea{font-family:'Space Mono',monospace;background:var(--bg);border:1px solid #444;border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange)}
textarea{resize:vertical;min-height:60px}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:var(--orange2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid #444}.btn-secondary:hover{background:#333}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-offen{background:#f07000;color:#fff}.badge-in-arbeit{background:#3b82f6;color:#fff}
.badge-fertig{background:#22c55e;color:#fff}.badge-abgerechnet{background:#666;color:#fff}
.badge-bezahlt{background:#22c55e;color:#fff}.badge-überfällig{background:#ef4444;color:#fff}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px}
#login-screen img{width:200px;margin-bottom:20px}
#login-screen h1{font-size:28px;color:var(--orange);margin-bottom:10px}
.login-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.login-card{background:var(--bg2);border:2px solid #333;border-radius:12px;padding:24px 32px;cursor:pointer;transition:all .2s;text-align:center;width:180px}
.login-card:hover{border-color:var(--orange);transform:translateY(-3px)}
.login-card h3{margin-top:8px;font-size:16px}.login-card p{color:var(--text2);font-size:12px;margin-top:4px}
.login-card .avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;margin:0 auto}

/* LAYOUT */
#app{display:none;height:100vh}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid #333;padding:16px 0;overflow-y:auto;z-index:100}
#sidebar .logo{padding:12px 16px;text-align:center;border-bottom:1px solid #333;margin-bottom:12px}
#sidebar .logo img{width:140px}
#sidebar .logo-text{font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--orange);font-weight:700}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--text2);text-decoration:none;font-size:13px;transition:all .15s;border-left:3px solid transparent}
#sidebar nav a:hover{background:var(--bg3);color:var(--text)}
#sidebar nav a.active{background:var(--bg3);color:var(--orange);border-left-color:var(--orange)}
#sidebar .user-info{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;border-top:1px solid #333;font-size:11px;color:var(--text2)}
#sidebar .user-info strong{color:var(--text);display:block}
#main{margin-left:var(--sidebar-w);padding:24px 32px;min-height:100vh;overflow-y:auto}
#main h2{font-size:24px;margin-bottom:20px;color:var(--orange)}

/* KPI Cards */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid #333;border-radius:10px;padding:20px;text-align:center}
.kpi .val{font-size:28px;font-weight:700;color:var(--orange);font-family:'Barlow Condensed',sans-serif}
.kpi .lbl{font-size:12px;color:var(--text2);margin-top:4px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:12px;color:var(--text2);border-bottom:1px solid #444}
td{padding:10px 12px;border-bottom:1px solid #222}
tr:hover td{background:var(--bg2)}
.tbl-wrap{background:var(--bg2);border:1px solid #333;border-radius:10px;overflow:hidden;margin-bottom:20px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid #444;border-radius:12px;padding:28px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:20px;color:var(--orange);margin-bottom:16px;font-family:'Barlow Condensed',sans-serif}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.modal .form-row.full{grid-template-columns:1fr}
.modal label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.modal .btns{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* Search bar */
.search-bar{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.search-bar input{max-width:300px}
.search-bar select{max-width:180px}

/* Stock bar */
.stock-bar{width:80px;height:8px;background:#333;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.stock-bar-fill{height:100%;border-radius:4px;transition:width .3s}

/* Mobile Overlay */
#mobile-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:none;flex-direction:column;overflow-y:auto}
#mobile-overlay .mob-header{background:var(--bg2);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
#mobile-overlay .mob-header img{height:30px}
#mobile-overlay .mob-content{padding:16px;flex:1}
.mob-card{background:var(--bg2);border:1px solid #333;border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer}
.mob-card:hover{border-color:var(--orange)}
.timer-display{font-size:48px;font-family:'Barlow Condensed',sans-serif;text-align:center;color:var(--orange);padding:20px 0}
.mob-btn{width:100%;padding:14px;font-size:15px;margin-bottom:10px;min-height:44px}
</style>
</head>

let D;
function loadData(){const s=localStorage.getItem('svc_data');D=s?JSON.parse(s):JSON.parse(JSON.stringify(DEMO_DATA))}
function saveData(){localStorage.setItem('svc_data',JSON.stringify(D))}

// ============================================================
// AUTH
// ============================================================
let currentUser=null;
function doLogin(role){
  const staff=D.staff.find(s=>s.role===role)||D.staff[0];
  currentUser={...staff,role};
  document.getElementById('login-screen').style.display='none';
  if(role==='mechaniker'){
    document.getElementById('mobile-overlay').style.display='flex';
    document.getElementById('mob-user').textContent=staff.name;
    renderMobile();
  } else {
    document.getElementById('app').style.display='block';
    document.getElementById('user-display').textContent=staff.name;
    document.getElementById('role-display').textContent=role==='admin'?'Administrator':'Chef-Mechaniker';
    navigate('dashboard');
  }
}
function doLogout(){
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('mobile-overlay').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ============================================================
// NAVIGATION
// ============================================================
document.querySelectorAll('#sidebar nav a').forEach(a=>{
  a.addEventListener('click',e=>{e.preventDefault();navigate(a.dataset.view)})
});
function navigate(view){
  document.querySelectorAll('#sidebar nav a').forEach(a=>a.classList.toggle('active',a.dataset.view===view));
  const m=document.getElementById('main');
  switch(view){
    case'dashboard':m.innerHTML=renderDashboard();break;
    case'auftraege':m.innerHTML=renderAuftraege();break;
    case'kunden':m.innerHTML=renderKunden();break;
    case'lager':m.innerHTML=renderLager();break;
    case'rechnungen':m.innerHTML=renderRechnungen();break;
    case'buchhaltung':m.innerHTML=renderBuchhaltung();break;
    case'personal':m.innerHTML=renderPersonal();break;
    case'import-export':m.innerHTML=renderImportExport();break;
    case'einstellungen':m.innerHTML=renderEinstellungen();break;
  }
}

function fmt(n){return new Intl.NumberFormat('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)}
function getCustomer(id){return D.customers.find(c=>c.id===id)}
function getOrder(id){return D.orders.find(o=>o.id===id)}
function getPart(id){return D.parts.find(p=>p.id===id)}
function getInvoice(id){return D.invoices.find(i=>i.id===id)}
function statusBadge(s){return `<span class="badge badge-${s}">${s}</span>`}
function orderTotal(o){
  const matl=o.parts.reduce((s,p)=>s+p.qty*p.prc,0);
  const time=o.time.reduce((s,t)=>s+t.h,0)*125;
  return matl+time;
}

function filterOrders(){
  const q=(document.getElementById('ord-search')?.value||'').toLowerCase();
  const f=document.getElementById('ord-filter')?.value||'';
  const tb=document.getElementById('ord-tbody');if(!tb)return;
  let rows='';
  D.orders.filter(o=>{
    if(f&&o.status!==f)return false;
    const c=getCustomer(o.cid);
    const txt=(o.id+' '+(c?c.name:'')+' '+o.desc).toLowerCase();
    return txt.includes(q);
  }).forEach(o=>{
    const c=getCustomer(o.cid);
    const bike=c&&c.bikes[o.bike]?c.bikes[o.bike].model:'';
    const re=o.status==='fertig'&&!o.invoiced?`<button class="btn-primary" style="padding:4px 8px;font-size:11px" onclick="event.stopPropagation();createInvoiceFromOrder('${o.id}')">→ RE</button>`:'';
    rows+=`<tr style="cursor:pointer" onclick="openOrder('${o.id}')"><td>${o.id}</td><td>${c?c.name:'-'}</td><td style="font-size:11px">${bike}</td><td>${o.desc}</td><td>${statusBadge(o.status)}</td><td>${o.prio==='hoch'?'<span style="color:var(--red)">⚡ Hoch</span>':'Normal'}</td><td>${o.mech}</td><td>CHF ${fmt(orderTotal(o))}</td><td>${re}</td></tr>`;
  });
  tb.innerHTML=rows;
}

}
function deleteOrder(id){if(!confirm('Auftrag wirklich löschen?'))return;D.orders=D.orders.filter(o=>o.id!==id);saveData();closeModal();navigate('auftraege')}
function addPartToOrder(oid){
  const o=getOrder(oid);const pid=gv('eo-partsel');const qty=parseInt(gv('eo-partqty'))||1;
  const part=getPart(pid);if(!part)return;
  if(part.stock<qty){alert('Nicht genug an Lager!');return}
  part.stock-=qty;
  o.parts.push({pid,qty,prc:part.sell});
  saveData();openOrder(oid);
}
function removePartFromOrder(oid,idx){
  const o=getOrder(oid);const p=o.parts[idx];
  const part=getPart(p.pid);if(part)part.stock+=p.qty;
  o.parts.splice(idx,1);saveData();openOrder(oid);
}
function addTimeToOrder(oid){
  const o=getOrder(oid);
  o.time.push({date:gv('eo-tdate'),h:parseFloat(gv('eo-th'))||0,desc:gv('eo-tdesc'),mech:currentUser.id});
  saveData();openOrder(oid);
}

function renderLager(){
  const totalVal=D.parts.reduce((s,p)=>s+p.stock*p.buy,0);
  const cats=['','Verbrauch','Filter','Reifen','Bremsen','Motor','Elektrik','Auspuff','Lenker','Zündung','Service-Kit','Zubehör'];
  let catOpts=cats.map(c=>`<option value="${c}">${c||'Alle Kategorien'}</option>`).join('');
  return `<h2>📦 Lager / Ersatzteile</h2>
  <div class="search-bar"><input placeholder="Suche..." id="lag-search" oninput="filterLager()"><select id="lag-cat" onchange="filterLager()">${catOpts}</select><button class="btn-primary" onclick="newPartModal()">+ Neuer Artikel</button><span style="margin-left:auto;font-size:12px;color:var(--text2)">Lagerwert: <strong style="color:var(--orange)">CHF ${fmt(totalVal)}</strong></span></div>
  <div class="tbl-wrap"><table><thead><tr><th>SKU</th><th>Artikel</th><th>Kat</th><th>Bestand</th><th>Min</th><th>EK</th><th>VK</th><th>Marge</th><th>Bestand ±</th><th></th></tr></thead><tbody id="lag-tbody"></tbody></table></div>`;
  setTimeout(filterLager,0);
}
function filterLager(){
  const q=(document.getElementById('lag-search')?.value||'').toLowerCase();
  const cat=document.getElementById('lag-cat')?.value||'';
  const tb=document.getElementById('lag-tbody');if(!tb)return;
  let rows='';
  D.parts.filter(p=>{
    if(cat&&p.cat!==cat)return false;
    return(p.name+p.sku+p.cat).toLowerCase().includes(q);
  }).forEach(p=>{
    const pct=((p.sell-p.buy)/p.sell*100).toFixed(0);
    const lvl=p.stock<=p.min?'var(--red)':p.stock<=p.min*2?'#eab308':'var(--green)';
    const barW=Math.min(100,Math.round(p.stock/(p.min*3)*100));
    rows+=`<tr><td style="font-size:11px">${p.sku}</td><td>${p.name}</td><td><span style="color:${catColors[p.cat]||'#fff'}">${p.cat}</span></td><td><span style="color:${lvl}">${p.stock}</span> <div class="stock-bar"><div class="stock-bar-fill" style="width:${barW}%;background:${lvl}"></div></div></td><td>${p.min}</td><td>${fmt(p.buy)}</td><td>${fmt(p.sell)}</td><td>${pct}%</td><td><button class="btn-secondary" style="padding:2px 8px;font-size:11px" onclick="adjStock('${p.id}',-1)">−</button> <button class="btn-secondary" style="padding:2px 8px;font-size:11px" onclick="adjStock('${p.id}',1)">+</button></td><td><button class="btn-secondary" style="padding:2px 8px;font-size:11px" onclick="editPartModal('${p.id}')">✎</button></td></tr>`;
  });
  tb.innerHTML=rows;
}

function markPaid(id){const inv=getInvoice(id);if(inv){inv.status='bezahlt';saveData();navigate('rechnungen')}}
function createInvoiceFromOrder(oid){
  const o=getOrder(oid);if(!o)return;
  D.counters.invoice++;
  const id='RG2026'+String(D.counters.invoice).padStart(3,'0');
  let pos=[];
  o.parts.forEach(p=>{const pp=getPart(p.pid);pos.push({desc:pp?pp.name:p.pid,qty:p.qty,unit:'Stk',prc:p.prc})});
  o.time.forEach(t=>{pos.push({desc:t.desc||'Arbeitszeit',qty:t.h,unit:'Std',prc:125})});
  const today=new Date().toISOString().slice(0,10);
  const due=new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  D.invoices.push({id,oid,cid:o.cid,date:today,due,status:'offen',pos});
  o.invoiced=true;o.status='abgerechnet';
  saveData();closeModal();navigate('rechnungen');
}

  let custOpts=D.customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

function saveNewInvoice(){
  D.counters.invoice++;

}

function generatePDF(invId){
  const inv=getInvoice(invId);if(!inv)return;
  const c=getCustomer(inv.cid);if(!c)return;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const W=210,H=297;
  const netto=invoiceTotal(inv);
  const mwst=netto*0.081;
  const brutto=netto+mwst;

  // Header bar
  doc.setFillColor(240,112,0);doc.rect(0,0,W,28,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(255,255,255);
  doc.text('SVENCYCLES GmbH',14,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Neunfornerstrasse 2 | 8468 Waltalingen',14,22);
  doc.text('Tel 052 746 10 60 | info@svencycles.ch',W-14,14,{align:'right'});
  doc.text('www.svencycles.ch',W-14,20,{align:'right'});

  // Invoice badge
  doc.setFillColor(240,112,0);doc.roundedRect(14,34,50,10,2,2,'F');
  doc.setFontSize(11);doc.setTextColor(255,255,255);doc.text('Rechnung '+inv.id,18,41);

  // Date
  doc.setTextColor(60,60,60);doc.setFontSize(10);
  doc.text('Datum: '+inv.date,W-14,38,{align:'right'});
  doc.text('Fällig: '+inv.due,W-14,44,{align:'right'});

  // Customer address
  doc.setFontSize(11);doc.setTextColor(30,30,30);
  doc.text(c.name,14,56);doc.text(c.strasse,14,62);doc.text(c.plz+' '+c.ort,14,68);

  // Positions table
  let y=80;
  doc.setFillColor(240,112,0);doc.rect(14,y,W-28,8,'F');
  doc.setFontSize(9);doc.setTextColor(255,255,255);
  doc.text('Pos',16,y+6);doc.text('Beschreibung',28,y+6);doc.text('Menge',110,y+6);doc.text('Einheit',128,y+6);doc.text('Preis',152,y+6);doc.text('Total',176,y+6);
  y+=12;doc.setTextColor(30,30,30);
  inv.pos.forEach((p,i)=>{
    doc.text(String(i+1),16,y);doc.text(p.desc.substring(0,40),28,y);
    doc.text(String(p.qty),112,y);doc.text(p.unit,130,y);
    doc.text(fmt(p.prc),156,y,{align:'right'});doc.text(fmt(p.qty*p.prc),192,y,{align:'right'});
    y+=7;
  });

  // Totals
  y+=5;doc.setDrawColor(200);doc.line(120,y,196,y);y+=8;
  doc.setFontSize(10);
  doc.text('Netto CHF',140,y);doc.text(fmt(netto),192,y,{align:'right'});y+=6;
  doc.text('MWST 8.1%',140,y);doc.text(fmt(mwst),192,y,{align:'right'});y+=6;
  doc.setDrawColor(200);doc.line(120,y-2,196,y-2);
  doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(240,112,0);
  doc.text('Total CHF '+fmt(brutto),192,y+5,{align:'right'});

  // Footer info
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100);
  doc.text('MWST-Nr: CHE-361.121.290 MWST | IBAN: CH56 0483 5012 3456 7800 9',14,180);

  // === Swiss QR Payment Slip ===
  const slipY=192;
  // Separator line
  doc.setDrawColor(0);doc.setLineWidth(0.3);doc.setLineDashPattern([2,2]);
  doc.line(0,slipY,W,slipY);doc.setLineDashPattern([]);
  doc.setFontSize(7);doc.text('✂',4,slipY-1);

  // Vertical separator
  doc.setLineDashPattern([2,2]);doc.line(62,slipY,62,H);doc.setLineDashPattern([]);

  // --- Empfangsschein (left, 0-62mm) ---
  let ey=slipY+8;
  doc.setFontSize(6);doc.setTextColor(0);doc.setFont('helvetica','bold');
  doc.text('Empfangsschein',5,ey);ey+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(6);
  doc.text('Konto / Zahlbar an',5,ey);ey+=4;
  doc.text('CH56 0483 5012 3456 7800 9',5,ey);ey+=3;
  doc.text('Svencycles GmbH',5,ey);ey+=3;
  doc.text('Neunfornerstrasse 2',5,ey);ey+=3;
  doc.text('8468 Waltalingen',5,ey);ey+=6;
  doc.setFont('helvetica','bold');doc.text('Zahlbar durch',5,ey);ey+=4;
  doc.setFont('helvetica','normal');
  doc.text(c.name,5,ey);ey+=3;doc.text(c.strasse,5,ey);ey+=3;doc.text(c.plz+' '+c.ort,5,ey);ey+=8;
  doc.setFont('helvetica','bold');doc.text('Währung',5,ey);doc.text('Betrag',25,ey);ey+=4;
  doc.setFont('helvetica','normal');doc.text('CHF',5,ey);doc.text(fmt(brutto),25,ey);ey+=8;
  doc.setFontSize(5);doc.text('Annahmestelle',40,H-5);

  // --- Zahlteil (right, 62-210mm) ---
  let zy=slipY+8;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text('Zahlteil',67,zy);zy+=4;

  // QR Code
  const iban='CH5604835012345678009';
  const qrPayload='SPC\r\n0200\r\n1\r\n'+iban+'\r\nK\r\nSvencycles GmbH\r\nNeunfornerstrasse 2\r\n8468 Waltalingen\r\n\r\n\r\nCH\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n'+brutto.toFixed(2)+'\r\nCHF\r\nK\r\n'+c.name+'\r\n'+c.strasse+'\r\n'+c.plz+' '+c.ort+'\r\n\r\n\r\nCH\r\nNON\r\n\r\n'+inv.id+'\r\nEPD';

  // Generate QR on hidden div
  const qrDiv=document.getElementById('qr-container');
  qrDiv.innerHTML='';
  new QRCode(qrDiv,{text:qrPayload,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});
  setTimeout(()=>{
    const canvas=qrDiv.querySelector('canvas');
    if(canvas){
      const imgData=canvas.toDataURL('image/png');
      doc.addImage(imgData,'PNG',67,zy,46,46);
      // Swiss cross in center
      const cx=67+23,cy=zy+23;
      doc.setFillColor(0,0,0);doc.rect(cx-3.5,cy-3.5,7,7,'F');
      doc.setFillColor(255,255,255);doc.rect(cx-2.5,cy-0.7,5,1.4,'F');doc.rect(cx-0.7,cy-2.5,1.4,5,'F');
    }
    // Payment info right of QR
    let ry=zy+2;const rx=118;
    doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(0);
    doc.text('Konto / Zahlbar an',rx,ry);ry+=4;
    doc.setFont('helvetica','normal');
    doc.text('CH56 0483 5012 3456 7800 9',rx,ry);ry+=3;
    doc.text('Svencycles GmbH',rx,ry);ry+=3;
    doc.text('Neunfornerstrasse 2',rx,ry);ry+=3;
    doc.text('8468 Waltalingen',rx,ry);ry+=6;
    doc.setFont('helvetica','bold');doc.text('Referenz',rx,ry);ry+=4;
    doc.setFont('helvetica','normal');doc.text(inv.id,rx,ry);ry+=6;
    doc.setFont('helvetica','bold');doc.text('Zahlbar durch',rx,ry);ry+=4;
    doc.setFont('helvetica','normal');
    doc.text(c.name,rx,ry);ry+=3;doc.text(c.strasse,rx,ry);ry+=3;doc.text(c.plz+' '+c.ort,rx,ry);ry+=8;
    doc.setFont('helvetica','bold');doc.text('Währung',rx,ry);doc.text('Betrag',rx+20,ry);ry+=4;
    doc.setFont('helvetica','normal');doc.text('CHF',rx,ry);doc.text(fmt(brutto),rx+20,ry);

    doc.save('Rechnung_'+inv.id+'.pdf');
  },300);
}

// BUCHHALTUNG
// ============================================================
function renderBuchhaltung(){
  const year=new Date().getFullYear();
  const yearInv=D.invoices.filter(i=>i.date.startsWith(year));
  const paid=yearInv.filter(i=>i.status==='bezahlt');
  const overdue=yearInv.filter(i=>i.status==='überfällig');
  const open=yearInv.filter(i=>i.status==='offen');
  const totalPaid=paid.reduce((s,i)=>s+invoiceTotal(i),0);
  const totalOver=overdue.reduce((s,i)=>s+invoiceTotal(i),0);
  const totalOpen=open.reduce((s,i)=>s+invoiceTotal(i),0);
  const totalYear=yearInv.reduce((s,i)=>s+invoiceTotal(i),0);

  let months='';
  for(let m=0;m<12;m++){
    const mi=yearInv.filter(i=>new Date(i.date).getMonth()===m);
    if(mi.length===0)continue;
    const net=mi.reduce((s,i)=>s+invoiceTotal(i),0);
    const vat=net*0.081;
    months+=`<tr><td>${['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][m]} ${year}</td><td>${mi.length}</td><td>CHF ${fmt(net)}</td><td>CHF ${fmt(vat)}</td><td>CHF ${fmt(net+vat)}</td></tr>`;
  }

  let overdueRows=D.invoices.filter(i=>i.status==='überfällig'||i.status==='offen').map(i=>{const c=getCustomer(i.cid);return `<tr><td>${i.id}</td><td>${c?c.name:'-'}</td><td>${i.due}</td><td>${statusBadge(i.status)}</td><td>CHF ${fmt(invoiceTotal(i))}</td></tr>`}).join('');

  return `<h2>💰 Buchhaltung</h2>
  <div class="kpi-row">
    <div class="kpi"><div class="val">CHF ${fmt(totalYear)}</div><div class="lbl">Jahresumsatz ${year}</div></div>
    <div class="kpi"><div class="val" style="color:var(--green)">CHF ${fmt(totalPaid)}</div><div class="lbl">Bezahlt</div></div>
    <div class="kpi"><div class="val" style="color:var(--red)">CHF ${fmt(totalOver)}</div><div class="lbl">Überfällig</div></div>
    <div class="kpi"><div class="val">CHF ${fmt(totalOpen)}</div><div class="lbl">Ausstehend</div></div>
  </div>
  <h3 style="margin:16px 0 8px">Monatsumsatz ${year}</h3>
  <div class="tbl-wrap"><table><tr><th>Monat</th><th>Anz. RE</th><th>Netto</th><th>MWST</th><th>Brutto</th></tr>${months}</table></div>
  <h3 style="margin:16px 0 8px">Ausstehende Zahlungen</h3>
  <div class="tbl-wrap"><table><tr><th>Nr</th><th>Kunde</th><th>Fällig</th><th>Status</th><th>Betrag</th></tr>${overdueRows}</table></div>
  <button class="btn-primary" onclick="exportMwstCSV()">MWST-Auszug CSV exportieren</button>`;
}
function exportMwstCSV(){
  let csv='Rechnung;Datum;Kunde;Netto;MWST 8.1%;Brutto\n';
  D.invoices.forEach(i=>{
    const c=getCustomer(i.cid);const n=invoiceTotal(i);
    csv+=`${i.id};${i.date};${c?c.name:'-'};${n.toFixed(2)};${(n*0.081).toFixed(2)};${(n*1.081).toFixed(2)}\n`;
  });
  downloadFile('MWST_Auszug_Svencycles.csv',csv,'text/csv');
}

  let csv='';
  if(type==='customers'){
    csv='ID;Name;Tel;Email;Strasse;PLZ;Ort;Motorräder\n';
    D.customers.forEach(c=>{csv+=`${c.id};${c.name};${c.tel};${c.email};${c.strasse};${c.plz};${c.ort};${c.bikes.map(b=>b.model).join(', ')}\n`});

    csv='ID;Name;SKU;Kategorie;Bestand;Min;EK;VK;Lieferant\n';
    D.parts.forEach(p=>{csv+=`${p.id};${p.name};${p.sku};${p.cat};${p.stock};${p.min};${p.buy};${p.sell};${p.sup}\n`});

  }else if(type==='invoices'){
    csv='ID;Kunde;Datum;Fällig;Status;Total\n';
    D.invoices.forEach(i=>{const c=getCustomer(i.cid);csv+=`${i.id};${c?c.name:'-'};${i.date};${i.due};${i.status};${invoiceTotal(i).toFixed(2)}\n`});
  }
  downloadFile('Svencycles_'+type+'_'+new Date().toISOString().slice(0,10)+'.csv',csv,'text/csv');
}

  Lager-Artikel: ${D.parts.length}<br>
  Rechnungen: ${D.invoices.length}<br>
  Storage: ${(size/1024).toFixed(1)} KB
  </p>
  <hr style="border-color:#333;margin:16px 0">
  <p style="font-size:11px;color:var(--text2)">Geplant für v2.0: Firmendaten editierbar, Multi-User, Cloud-Sync, WhatsApp-Integration</p>
  </div>`;
}

// ============================================================
// MOBILE VIEW (within index.html for mechaniker role)
// ============================================================
let mobileTimer=null,mobileSeconds=0,mobileOrderId=null;
function renderMobile(){
  const mc=document.getElementById('mob-content');
  if(mobileOrderId){renderMobileOrder(mobileOrderId);return}
  const myOrders=D.orders.filter(o=>o.mech===currentUser.id&&o.status!=='abgerechnet');
  let h='<h3 style="color:var(--orange);margin-bottom:12px">Meine Aufträge</h3>';
  if(myOrders.length===0)h+='<p style="color:var(--text2)">Keine Aufträge zugewiesen.</p>';
  myOrders.forEach(o=>{
    const c=getCustomer(o.cid);
    h+=`<div class="mob-card" onclick="mobileOrderId='${o.id}';renderMobile()">
    <div style="display:flex;justify-content:space-between;align-items:center"><strong>${o.id}</strong>${statusBadge(o.status)}</div>
    <div style="margin-top:6px;font-size:13px">${c?c.name:'-'}</div>
    <div style="font-size:12px;color:var(--text2)">${o.desc}</div>
    </div>`;
  });
  mc.innerHTML=h;
}
function renderMobileOrder(oid){
  const o=getOrder(oid);if(!o){mobileOrderId=null;renderMobile();return}
  const c=getCustomer(o.cid);
  let timeRows=o.time.filter(t=>t.mech===currentUser.id).map(t=>`<div style="font-size:12px;padding:6px 0;border-bottom:1px solid #222">${t.date} — ${t.h}h — ${t.desc}</div>`).join('');
  const mc=document.getElementById('mob-content');
  mc.innerHTML=`
  <button class="btn-secondary mob-btn" onclick="mobileOrderId=null;renderMobile()">← Zurück</button>
  <h3 style="color:var(--orange);margin:12px 0">${o.id} — ${o.desc}</h3>
  <p style="font-size:13px;margin-bottom:8px">Kunde: ${c?c.name:'-'} | Status: ${o.status}</p>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn-primary mob-btn" style="flex:1" onclick="setMobStatus('${oid}','in-arbeit')">▶ In Arbeit</button>
    <button class="btn-success mob-btn" style="flex:1" onclick="setMobStatus('${oid}','fertig')">✓ Fertig</button>
  </div>
  <div class="timer-display" id="timer-disp">${fmtTime(mobileSeconds)}</div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn-primary mob-btn" style="flex:1" id="timer-btn" onclick="toggleTimer()">${mobileTimer?'⏹ Stop':'▶ Start'}</button>
  </div>
  <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text2)">Stunden manuell</label><input id="mob-hours" type="number" step="0.25" value="${(mobileSeconds/3600).toFixed(2)}" style="margin-top:4px"></div>
  <div style="margin-bottom:12px"><label style="font-size:11px;color:var(--text2)">Beschrieb</label><textarea id="mob-desc" style="margin-top:4px" placeholder="Was wurde gemacht?"></textarea></div>
  <button class="btn-success mob-btn" onclick="bookMobTime('${oid}')">✓ Zeit buchen</button>
  <h4 style="color:var(--orange);margin:16px 0 8px">Gebuchte Zeiten</h4>
  ${timeRows||'<p style="color:var(--text2);font-size:12px">Noch keine Zeiten gebucht.</p>'}`;
}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function toggleTimer(){
  if(mobileTimer){clearInterval(mobileTimer);mobileTimer=null}
  else{mobileTimer=setInterval(()=>{mobileSeconds++;const d=document.getElementById('timer-disp');if(d)d.textContent=fmtTime(mobileSeconds)},1000)}
  const btn=document.getElementById('timer-btn');if(btn)btn.textContent=mobileTimer?'⏹ Stop':'▶ Start';
}
function bookMobTime(oid){
  const o=getOrder(oid);if(!o)return;
  const h=parseFloat(document.getElementById('mob-hours')?.value)||(mobileSeconds/3600);
  const desc=document.getElementById('mob-desc')?.value||'';
  o.time.push({date:new Date().toISOString().slice(0,10),h:Math.round(h*4)/4,desc,mech:currentUser.id});
  mobileSeconds=0;if(mobileTimer){clearInterval(mobileTimer);mobileTimer=null}
  saveData();renderMobileOrder(oid);
}
function setMobStatus(oid,status){const o=getOrder(oid);if(o){o.status=status;saveData();renderMobileOrder(oid)}}

// ============================================================
// UTILITIES
// ============================================================
function gv(id){return document.getElementById(id)?.value||''}
function showModal(html){
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='modal-ov';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal()});
  document.body.appendChild(ov);
}
function closeModal(){document.getElementById('modal-ov')?.remove()}
function downloadFile(name,content,type){
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}
</script>
